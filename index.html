<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Love! 💖</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-complete@1.0.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffe4e6 0%, #fecdd3 50%, #fbcfe8 100%);
        }
        .romantic-font {
            font-family: 'Dancing Script', cursive;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 182, 193, 0.4);
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 24px;
            pointer-events: none;
            z-index: 1;
            bottom: -20px;
            animation: float 6s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 overflow-x-hidden relative bg-rose-50">

    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Container -->
    <div class="glass-card rounded-3xl p-6 md:p-10 shadow-2xl max-w-lg w-full text-center z-10 my-8 transition-all duration-500">
        
        <!-- Animated Heart Badge -->
        <div class="inline-block bg-rose-100 text-rose-600 text-xs font-bold tracking-widest uppercase px-4 py-1.5 rounded-full mb-6 shadow-sm border border-rose-200 animate-pulse">
            To The Most Beautiful Girl ✨
        </div>

        <!-- Photo Gallery (Main Image) -->
        <div class="relative w-40 h-40 mx-auto mb-6">
            <div class="absolute inset-0 bg-gradient-to-r from-rose-400 to-pink-500 rounded-full blur-md opacity-70 animate-pulse"></div>
            <!-- 📸 මෙතනට එයාගේ ලස්සනම ෆොටෝ එකක් දාන්න -->
            <img class="relative w-40 h-40 rounded-full object-cover border-4 border-white mx-auto shadow-lg" 
                 src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500" 
                 alt="My Princess">
        </div>

        <!-- Big Romantic Greeting -->
        <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 tracking-tight mb-2">
            Happy Birthday,
        </h1>
        <!-- ✍️ එයාගේ නම මෙතනට ලියන්න -->
        <p class="romantic-font text-6xl text-rose-600 my-2">My Princess 👸</p>
        
        <!-- Heartfelt Message -->
        <p class="text-gray-600 leading-relaxed my-6 text-sm md:text-base font-medium px-2">
            "ජීවිතේ මට හමුවුණු වටිනාම සහ ලස්සනම කෙනාට සුභම සුභ උපන්දිනයක් වේවා! 💖 ඔයා මගේ ජීවිතයට ආපු දවසේ ඉඳන් හැමදේම ගොඩක් ලස්සන වුණා. හැමදාමත් ඔය විදිහටම සතුටින් මගේ ළඟින් ඉන්න. I love you so much! 🌹✨"
        </p>

        <!-- Interactive Surprise Button -->
        <button id="wish-btn" class="w-full bg-gradient-to-r from-rose-500 via-pink-500 to-rose-600 hover:from-rose-600 hover:to-pink-600 text-white font-bold py-4 px-8 rounded-full shadow-lg hover:shadow-rose-300/50 hover:shadow-2xl transition-all duration-300 transform active:scale-95 focus:outline-none text-lg">
            Touch My Heart ❤️
        </button>

        <!-- Music Control -->
        <button id="music-btn" class="mt-5 text-xs font-semibold text-rose-500 hover:text-rose-700 bg-rose-100/60 px-4 py-2 rounded-full transition-colors focus:outline-none inline-flex items-center gap-1">
            <span>🎵</span> <span id="btn-text">Play Romantic Music</span>
        </button>
    </div>

    <!-- Mini Image Grid (Our Memories Section) -->
    <div class="z-10 w-full max-w-lg grid grid-cols-3 gap-3 px-2 mb-8">
        <img class="rounded-xl shadow-md h-24 w-full object-cover border border-white" src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=400" alt="Memory 1">
        <img class="rounded-xl shadow-md h-24 w-full object-cover border border-white" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400" alt="Memory 2">
        <img class="rounded-xl shadow-md h-24 w-full object-cover border border-white" src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=400" alt="Memory 3">
    </div>

    <script>
        const wishBtn = document.getElementById('wish-btn');
        const musicBtn = document.getElementById('music-btn');
        const btnText = document.getElementById('btn-text');
        const bgMusic = document.getElementById('bg-music');

        // Create Floating Hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's'; // 3-6s
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Surprise Button Click
        wishBtn.addEventListener('click', () => {
            // Heart shapes confetti colors
            var colors = ['#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd'];
            
            // Confetti Burst
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: colors
            });

            // Continuous heart shower for 4 seconds
            const interval = setInterval(createHeart, 80);
            setTimeout(() => { clearInterval(interval); }, 4000);
        });

        // Music Controls
        let isPlaying = false;
        musicBtn.addEventListener('click', () => {
            if (!isPlaying) {
                bgMusic.play().then(() => {
                    isPlaying = true;
                    btnText.innerText = "Pause Music ⏸️";
                }).catch(err => console.log("Click again to play"));
            } else {
                bgMusic.pause();
                isPlaying = false;
                btnText.innerText = "Play Romantic Music 🎵";
            }
        });
    </script>
</body>
</html>
